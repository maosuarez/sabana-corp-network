name: Build and publish lab images

# Ver CLAUDE.md, "Convenciones para CI/CD". Un workflow con matrix sobre services/*, para que un cambio
# en un solo reto no obligue a reconstruir los demás. Se activa solo si cambian archivos del servicio
# correspondiente (o el propio workflow).
#
# Matrix cubre los 4 servicios con Dockerfile propio. Cada cambio en un servicio solo dispara
# la reconstrucción de esa imagen gracias al filtro de paths configurado más abajo.

on:
  push:
    branches: [main]
    paths:
      - "services/**"
      - ".github/workflows/build-push.yml"
  workflow_dispatch: {}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [webapp, database, linux-server, xss-bot]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Compute short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ./services/${{ matrix.service }}
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/sabana-lab-${{ matrix.service }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/sabana-lab-${{ matrix.service }}:${{ steps.vars.outputs.sha_short }}
