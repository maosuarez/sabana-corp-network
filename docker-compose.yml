services:
  database:
    build: ./services/database
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      DB_APP_USER: ${DB_APP_USER}
      DB_APP_PASSWORD: ${DB_APP_PASSWORD}
      FLAG_DATABASE: ${FLAG_DATABASE}
      PIVOT_SSH_PASSWORD: ${PIVOT_SSH_PASSWORD}
    # Publicado a propósito: el participante debe poder conectarse directamente a MariaDB una vez
    # filtra las credenciales en el Reto 1 (ver docs/context.md, "Arquitectura general").
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - sabana-lab

  webapp:
    build: ./services/webapp
    environment:
      DB_HOST: database
      DB_NAME: ${MYSQL_DATABASE}
      DB_APP_USER: ${DB_APP_USER}
      DB_APP_PASSWORD: ${DB_APP_PASSWORD}
      JWT_SIGNING_SECRET: ${JWT_SIGNING_SECRET}
      BOT_SECRET: ${BOT_SECRET}
      FLAG_WEBAPP_XSS: ${FLAG_WEBAPP_XSS}
      FLAG_WEBAPP_LFI: ${FLAG_WEBAPP_LFI}
    depends_on:
      database:
        condition: service_healthy
    ports:
      - "8080:80"
    networks:
      - sabana-lab

  linux-server:
    build: ./services/linux-server
    environment:
      PIVOT_SSH_PASSWORD: ${PIVOT_SSH_PASSWORD}
      FLAG_LINUXSERVER_ROOT: ${FLAG_LINUXSERVER_ROOT}
      FLAG_LINUXSERVER_PROC: ${FLAG_LINUXSERVER_PROC}
    # Puerto SSH expuesto para que el participante se conecte con la credencial crackeada en el Reto 2.
    ports:
      - "2222:22"
    networks:
      - sabana-lab

  xss-bot:
    build: ./services/xss-bot
    environment:
      WEBAPP_BASE_URL: ${WEBAPP_BASE_URL:-http://webapp:80}
      BOT_SECRET: ${BOT_SECRET}
      BOT_VISIT_INTERVAL_SECONDS: ${BOT_VISIT_INTERVAL_SECONDS:-30}
    depends_on:
      webapp:
        condition: service_started
    networks:
      - sabana-lab

networks:
  sabana-lab:
    driver: bridge
    # La topología final del laboratorio usa macvlan para IP propia por contenedor en la red física del
    # evento (ver docs/context.md, decisión de diseño #8, pendiente de docs/infra.jpg). Bridge estándar
    # es suficiente y más simple para desarrollo local.
